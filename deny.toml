[targets]
targets = [
{ triple = "x86_64-unknown-linux-gnu" },
{ triple = "wasm32-unknown-unknown" },
]

[licenses]
allow = ["MIT", "Apache-2.0", "BSL-1.1", "BSD-3-Clause"]
deny = ["GPL-3.0", "AGPL-3.0"]

[bans]
multiple-versions = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
