version: '3.9'

services:
  verity:
    build: .
    ports: ["8080:8080"]
    environment:
      - DATABASE_URL=postgresql://verity:verity@postgres:5432/verity
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - TEE_MODE=simulation
    depends_on: [postgres, otel-collector]
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: verity
      POSTGRES_PASSWORD: verity
      POSTGRES_DB: verity
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verity"]
      interval: 10s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v3.2
    ports: ["9090:9090"]
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  pgdata:
