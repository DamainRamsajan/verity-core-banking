<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Download Verity — Licence Required</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-950 text-white min-h-screen flex items-center justify-center"><div class="bg-gray-900 p-8 rounded-xl border border-gray-800 max-w-md w-full"><h1 class="text-2xl font-bold mb-2">Download Verity</h1><p class="text-gray-400 mb-6">Enter the licence key provided by Intellectica AI LLC.</p><form id="dl-form" class="space-y-4"><input type="text" id="key" placeholder="VERITY-..." required class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 text-white"><button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-semibold">Download Verity</button></form><p id="error" class="text-red-400 mt-4 hidden"></p><p id="success" class="text-green-400 mt-4 hidden">Download starting…</p></div><script>document.getElementById('dl-form').addEventListener('submit',async(e)=>{e.preventDefault();const key=document.getElementById('key').value.trim();document.getElementById('error').classList.add('hidden');document.getElementById('success').classList.add('hidden');try{const resp=await fetch(`https://vqkeafelksdtqqgixjow.supabase.co/functions/v1/verify-license?key=${encodeURIComponent(key)}`);if(resp.ok){document.getElementById('success').classList.remove('hidden');window.location.href=resp.url;}else{const msg=await resp.text();document.getElementById('error').textContent=msg||'Invalid licence key.';document.getElementById('error').classList.remove('hidden');}}catch(err){document.getElementById('error').textContent='Network error. Please try again.';document.getElementById('error').classList.remove('hidden');}});</script></body></html>
